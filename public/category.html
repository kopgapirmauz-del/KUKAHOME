<!doctype html>
<html lang="uz" data-lang="uz">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Katalog — KUKA HOME</title>
  <meta name="description" content="KUKA HOME katalog: divanlar, kreslolar, krovatlar, stol-stullar." />
  <link rel="canonical" href="https://YOUR_DOMAIN/category.html" />

  <link rel="stylesheet" href="./css/tokens.css">
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/components.css">
  <link rel="stylesheet" href="./css/pages.css">
</head>

<body class="page">
  <header class="topbar">
    <div class="container topbar__inner">
      <a class="brand" href="./index.html">
        <span class="brand__logo" aria-hidden="true"></span>
        <span>
          <div class="brand__name">KUKA HOME</div>
          <div class="brand__tag" data-i18n="nav.catalog">Catalog</div>
        </span>
      </a>

      <nav class="nav">
        <a class="nav__link" href="./index.html" data-i18n="nav.home">Home</a>
        <a class="nav__link is-active" href="./category.html" data-i18n="nav.catalog">Catalog</a>
        <a class="nav__link" href="./showrooms.html">Showrooms</a>
        <a class="nav__link" href="./contact.html" data-i18n="nav.contact">Contact</a>
      </nav>

      <div class="actions">
        <a class="btn btn--secondary btn--sm" href="./cart.html">🛒 <span id="cartCount" class="badge">0</span></a>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="container">
      <div class="page-title">
        <div class="page-title__kicker" data-i18n="nav.catalog">Catalog</div>
        <div class="page-title__h1" data-i18n="catalog.title">Catalog</div>
        <div class="page-title__sub">Qidiruv, filtr va saralash mock data bilan ishlaydi.</div>
      </div>

      <section class="catalog">
        <aside class="filters">
          <div class="filters__head">
            <div class="filters__title" data-i18n="common.filter">Filter</div>
            <button class="btn btn--ghost btn--sm" id="btnReset" type="button" data-i18n="common.reset">Reset</button>
          </div>

          <div class="filters__body">
            <div class="filter-block">
              <div class="filter-block__label">Category</div>
              <div class="chips" id="catChips">
                <button class="chip is-active" data-cat="">All</button>
                <button class="chip" data-cat="sofa">Sofa</button>
                <button class="chip" data-cat="armchair">Armchair</button>
                <button class="chip" data-cat="bed">Bed</button>
                <button class="chip" data-cat="table">Table</button>
              </div>
            </div>

            <div class="filter-block">
              <div class="filter-block__label" data-i18n="common.search">Search</div>
              <input class="input" id="q" placeholder="KF.7053 / KM.1238 / ..." />
            </div>

            <div class="filter-block">
              <div class="filter-block__label" data-i18n="catalog.sort.label">Sort</div>
              <select class="select" id="sort">
                <option value="popular" data-i18n="catalog.sort.popular">Popular</option>
                <option value="priceAsc" data-i18n="catalog.sort.priceAsc">Price: low to high</option>
                <option value="priceDesc" data-i18n="catalog.sort.priceDesc">Price: high to low</option>
              </select>
            </div>
          </div>
        </aside>

        <div>
          <div class="catalog__top">
            <div class="active-filters">
              <span class="active-filters__label">Active:</span>
              <span class="badge" id="activeText">All</span>
            </div>
            <button class="btn btn--secondary btn--sm" id="btnRefresh" type="button" data-i18n="common.refresh">Refresh</button>
          </div>

          <div class="grid" id="grid" style="grid-template-columns: repeat(3, 1fr); gap: var(--s-5);"></div>

          <div id="empty" class="empty" style="display:none; margin-top: var(--s-6);">
            <div class="empty__icon">🧩</div>
            <div class="empty__title">No products</div>
            <div class="empty__text">Filtrlarni o‘zgartiring.</div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script src="./js/main.js"></script>
  <script>
    // cart badge
    try {
      const cart = JSON.parse(localStorage.getItem("kuka_cart") || "[]");
      document.getElementById("cartCount").textContent = String(cart.reduce((s,i)=>s+(i.qty||1),0));
    } catch {}

    let ALL = [];
    const state = { cat:"", q:"", sort:"popular" };

    function priceOf(p){ return Number(p.salePrice || p.price || 0); }

    function apply(){
      const q = state.q.trim().toLowerCase();
      let list = ALL.slice();

      if(state.cat) list = list.filter(p => (p.category||"") === state.cat);
      if(q) list = list.filter(p => (p.id+" "+p.name).toLowerCase().includes(q));

      if(state.sort === "priceAsc") list.sort((a,b)=>priceOf(a)-priceOf(b));
      if(state.sort === "priceDesc") list.sort((a,b)=>priceOf(b)-priceOf(a));

      const grid = document.getElementById("grid");
      const empty = document.getElementById("empty");
      if(!list.length){ grid.innerHTML=""; empty.style.display="block"; return; }
      empty.style.display="none";

      grid.innerHTML = list.map(p => `
        <article class="card">
          <div class="card__media" style="aspect-ratio: 16/10; background: rgba(255,255,255,0.04);">
            <img src="${(p.images && p.images[0]) ? p.images[0] : "./images/placeholder.jpg"}" alt="${p.name}" style="width:100%;height:100%;object-fit:cover;">
          </div>
          <div class="card__body">
            <div style="font-weight:950">${p.name}</div>
            <div class="muted">${p.id} • ${p.category || ""}</div>
            <div class="row" style="margin-top:10px;">
              <div style="font-weight:950">${priceOf(p).toLocaleString("ru-RU")} ${p.currency || "UZS"}</div>
              <a class="btn btn--secondary btn--sm" href="./product.html?id=${encodeURIComponent(p.id)}">View</a>
            </div>
          </div>
        </article>
      `).join("");

      document.getElementById("activeText").textContent =
        (state.cat ? state.cat : "All") + (q ? ` • "${state.q}"` : "");
    }

    async function load(){
      const res = await fetch("./data/mocks/products.sample.json", { cache:"no-store" });
      const data = await res.json();
      ALL = data.products || [];
      apply();
    }

    document.getElementById("q").addEventListener("input", (e)=>{ state.q = e.target.value; apply(); });
    document.getElementById("sort").addEventListener("change", (e)=>{ state.sort = e.target.value; apply(); });

    document.getElementById("catChips").addEventListener("click", (e)=>{
      const btn = e.target.closest(".chip");
      if(!btn) return;
      state.cat = btn.dataset.cat || "";
      [...document.querySelectorAll(".chip")].forEach(x=>x.classList.remove("is-active"));
      btn.classList.add("is-active");
      apply();
    });

    document.getElementById("btnReset").addEventListener("click", ()=>{
      state.cat = ""; state.q = ""; state.sort = "popular";
      document.getElementById("q").value = "";
      document.getElementById("sort").value = "popular";
      [...document.querySelectorAll(".chip")].forEach((x,i)=>x.classList.toggle("is-active", i===0));
      apply();
    });

    document.getElementById("btnRefresh").addEventListener("click", load);

    load().catch(()=>{ document.getElementById("empty").style.display="block"; });
  </script>
</body>
</html>
