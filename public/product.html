<!doctype html>
<html lang="uz" data-lang="uz">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Product — KUKA HOME</title>
  <meta name="description" content="KUKA HOME mahsulot sahifasi." />

  <link rel="stylesheet" href="./css/tokens.css">
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/components.css">
  <link rel="stylesheet" href="./css/pages.css">
</head>

<body class="page">
  <header class="topbar">
    <div class="container topbar__inner">
      <a class="brand" href="./index.html">
        <span class="brand__logo" aria-hidden="true"></span>
        <span>
          <div class="brand__name">KUKA HOME</div>
          <div class="brand__tag">Product</div>
        </span>
      </a>

      <div class="actions">
        <a class="btn btn--ghost btn--sm" href="./category.html">← Catalog</a>
        <a class="btn btn--secondary btn--sm" href="./cart.html">🛒 <span id="cartCount" class="badge">0</span></a>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="container">
      <div class="breadcrumbs">
        <a href="./index.html">Home</a><span>•</span>
        <a href="./category.html">Catalog</a><span>•</span>
        <span id="crumbName">Product</span>
      </div>

      <section class="product-page" style="margin-top: var(--s-5);">
        <div class="card">
          <div class="card__media" style="aspect-ratio: 16/10; background: rgba(255,255,255,0.04);">
            <img id="img" src="./images/placeholder.jpg" alt="Product" style="width:100%;height:100%;object-fit:cover;">
          </div>
        </div>

        <article class="product-info">
          <div class="product-info__body">
            <div class="product-info__sku" id="sku">—</div>
            <h1 class="product-info__title" id="name">Loading…</h1>

            <div class="product-info__price">
              <div class="now" id="price">—</div>
              <div class="was" id="was" style="display:none;"></div>
            </div>

            <p class="product-info__desc" id="desc">
              Premium model. Full specs will be shown here.
            </p>

            <div class="product-info__actions">
              <button class="btn btn--primary" id="add" type="button" data-i18n="product.addToCart">Add to cart</button>
              <a class="btn btn--secondary" href="./cart.html" data-i18n="product.buyNow">Buy now</a>
            </div>
          </div>

          <div class="specs" id="specs"></div>
        </article>
      </section>
    </div>
  </main>

  <script src="./js/main.js"></script>
  <script>
    function getId(){
      const u = new URL(location.href);
      return u.searchParams.get("id") || "";
    }
    function money(n, c){ return (Number(n||0)).toLocaleString("ru-RU") + " " + (c||"UZS"); }

    // cart badge
    function renderCartCount(){
      try {
        const cart = JSON.parse(localStorage.getItem("kuka_cart") || "[]");
        document.getElementById("cartCount").textContent = String(cart.reduce((s,i)=>s+(i.qty||1),0));
      } catch {}
    }
    renderCartCount();

    (async ()=>{
      const id = getId();
      const res = await fetch("./data/mocks/products.sample.json", { cache:"no-store" });
      const data = await res.json();
      const p = (data.products || []).find(x => String(x.id) === String(id)) || (data.products||[])[0];

      if(!p){ document.getElementById("name").textContent = "Product not found"; return; }

      document.title = p.name + " — KUKA HOME";
      document.getElementById("crumbName").textContent = p.name;
      document.getElementById("sku").textContent = p.id;
      document.getElementById("name").textContent = p.name;

      const img = (p.images && p.images[0]) ? p.images[0] : "./images/placeholder.jpg";
      document.getElementById("img").src = img;
      document.getElementById("img").alt = p.name;

      const now = p.salePrice || p.price || 0;
      document.getElementById("price").textContent = money(now, p.currency);

      if(p.salePrice && p.price && p.salePrice < p.price){
        document.getElementById("was").style.display = "block";
        document.getElementById("was").textContent = money(p.price, p.currency);
      }

      const specsEl = document.getElementById("specs");
      const specs = p.specs || {};
      const rows = Object.entries(specs).map(([k,v]) => `
        <div class="spec-row">
          <div class="k">${k}</div>
          <div class="v">${String(v)}</div>
        </div>
      `).join("");
      specsEl.innerHTML = rows || `<div class="muted">No specs</div>`;

      document.getElementById("add").addEventListener("click", ()=>{
        const cart = JSON.parse(localStorage.getItem("kuka_cart") || "[]");
        const idx = cart.findIndex(i => i.id === p.id);
        if(idx >= 0) cart[idx].qty = (cart[idx].qty||1) + 1;
        else cart.push({ id: p.id, name: p.name, price: Number(now), currency: p.currency || "UZS", qty: 1, image: img });
        localStorage.setItem("kuka_cart", JSON.stringify(cart));
        renderCartCount();
      });
    })().catch(()=>{
      document.getElementById("name").textContent = "Error loading product";
    });
  </script>
</body>
</html>
