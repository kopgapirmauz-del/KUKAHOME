<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contact — KUKA HOME</title>
  <meta name="description" content="KUKA HOME aloqa: murojaat va konsultatsiya." />

  <link rel="stylesheet" href="./css/tokens.css">
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/components.css">
  <link rel="stylesheet" href="./css/pages.css">
</head>

<body class="page">
  <header class="topbar">
    <div class="container topbar__inner">
      <a class="brand" href="./index.html">
        <span class="brand__logo" aria-hidden="true"></span>
        <span>
          <div class="brand__name">KUKA HOME</div>
          <div class="brand__tag">Contact</div>
        </span>
      </a>

      <div class="actions">
        <a class="btn btn--ghost btn--sm" href="./index.html">Home</a>
        <a class="btn btn--secondary btn--sm" href="./category.html">Catalog</a>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="container">
      <div class="page-title">
        <div class="page-title__kicker" data-i18n="nav.contact">Contact</div>
        <div class="page-title__h1">Aloqa</div>
        <div class="page-title__sub">Formani yuboring — lead sifatida saqlanadi (keyin API ulanadi).</div>
      </div>

      <div class="page-split">
        <section class="card">
          <div class="card__body">
            <form id="leadForm" class="stack">
              <div class="field">
                <label class="label" for="name">Ism</label>
                <input class="input" id="name" required placeholder="Ism">
              </div>

              <div class="field">
                <label class="label" for="phone">Telefon</label>
                <input class="input" id="phone" required placeholder="+998 90 123 45 67">
              </div>

              <div class="field">
                <label class="label" for="city">Shahar</label>
                <input class="input" id="city" placeholder="Tashkent">
              </div>

              <div class="field">
                <label class="label" for="comment">Izoh</label>
                <textarea class="textarea" id="comment" rows="4" placeholder="Qaysi model qiziqtiryapti?"></textarea>
              </div>

              <button class="btn btn--primary" type="submit" data-i18n="lead.send">Send request</button>
              <div id="msg" class="alert" style="display:none;"></div>
            </form>
          </div>
        </section>

        <aside class="notice">
          <div class="notice__title">Showrooms</div>
          <div class="notice__text">
            Tashkent / Almaty / Shymkent (keyin real manzillar qo‘shamiz).
          </div>
          <div style="margin-top: var(--s-5); display:flex; gap:10px; flex-wrap:wrap;">
            <a class="btn btn--secondary" href="./showrooms.html">Showrooms</a>
            <a class="btn btn--ghost" href="./admin/index.html">Admin</a>
          </div>
        </aside>
      </div>
    </div>
  </main>

  <script src="./js/main.js"></script>
  <script>
    document.getElementById("leadForm").addEventListener("submit", async (e)=>{
      e.preventDefault();
      const msg = document.getElementById("msg");
      msg.style.display="none";

      // MVP: frontend ok (keyin Apps Script lead POST)
      msg.className = "alert alert--success";
      msg.textContent = "✅ Sent. Manager will contact you.";
      msg.style.display = "block";

      e.target.reset();
    });
  </script>
</body>
</html>
