<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Sahifa topilmadi | KUKA HOME</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --surface: #ffffff;
      --border: #e6e8ef;
      --text: #1a1f2e;
      --muted: #667085;
      --accent: #d9232e;
      --accent-2: #b71720;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Montserrat", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 8% 10%, rgba(217, 35, 46, 0.08), transparent 42%),
        radial-gradient(circle at 92% 86%, rgba(217, 35, 46, 0.07), transparent 38%),
        var(--bg);
      overflow: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      width: 30vmax;
      height: 30vmax;
      border-radius: 50%;
      filter: blur(65px);
      pointer-events: none;
      opacity: 0.2;
      animation: float 7.5s ease-in-out infinite alternate;
    }

    body::before {
      left: -9vmax;
      top: -11vmax;
      background: rgba(217, 35, 46, 0.2);
    }

    body::after {
      right: -10vmax;
      bottom: -12vmax;
      background: rgba(34, 50, 84, 0.12);
      animation-delay: 0.7s;
    }

    .card {
      width: min(92vw, 700px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: clamp(22px, 4vw, 40px);
      text-align: center;
      box-shadow: 0 24px 60px rgba(27, 39, 66, 0.12);
      animation: card-in 500ms cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .badge {
      width: 84px;
      height: 84px;
      margin: 0 auto 14px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #fff4f5;
      color: var(--accent);
      border: 1px solid #ffd6d9;
      animation: pulse 2s ease-in-out infinite;
    }

    h1 {
      margin: 0;
      font-size: clamp(56px, 13vw, 110px);
      line-height: 0.95;
      letter-spacing: 0.03em;
      color: #121a2c;
    }

    .title {
      margin: 12px 0 10px;
      font-size: clamp(22px, 4.2vw, 34px);
      font-weight: 700;
    }

    .desc {
      margin: 0 auto;
      max-width: 560px;
      color: var(--muted);
      font-size: clamp(15px, 2.4vw, 18px);
      line-height: 1.65;
    }

    .actions {
      margin-top: 26px;
      display: flex;
      justify-content: center;
    }

    .btn-home {
      border: 0;
      text-decoration: none;
      color: #ffffff;
      font-weight: 700;
      font-size: 15px;
      padding: 12px 20px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 12px 28px rgba(217, 35, 46, 0.3);
      transition: transform 160ms ease, box-shadow 160ms ease;
    }

    .btn-home:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 32px rgba(217, 35, 46, 0.35);
    }

    .hint {
      margin-top: 16px;
      font-size: 13px;
      color: #8a93a6;
    }

    @keyframes float {
      0% { transform: translate3d(0, 0, 0); }
      100% { transform: translate3d(20px, -16px, 0); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes card-in {
      from { opacity: 0; transform: translateY(16px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
  </style>
</head>
<body>
  <main class="card" role="main" aria-labelledby="title">
    <div class="badge" aria-hidden="true">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 11.5 12 4l9 7.5"></path>
        <path d="M5.5 10.5V20h13V10.5"></path>
        <path d="M9.5 20v-5.5h5V20"></path>
      </svg>
    </div>
    <h1>404</h1>
    <p class="title" id="title" data-i18n="title">Sahifa topilmadi</p>
    <p class="desc" data-i18n="desc">So'ralgan manzil topilmadi. URL noto'g'ri yozilgan bo'lishi mumkin yoki sahifa o'chirilgan.</p>
    <div class="actions">
      <a class="btn-home" href="/index.html" aria-label="Asosiy sahifaga qaytish" data-i18n-aria-label="button">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 12h18"></path>
          <path d="m8 7-5 5 5 5"></path>
        </svg>
        <span data-i18n="button">Asosiy sahifaga qaytish</span>
      </a>
    </div>
    <p class="hint">KUKA HOME Premium</p>
  </main>
  <script>
    (function () {
      var I18N = {
        uz: {
          pageTitle: '404 - Sahifa topilmadi | KUKA HOME',
          title: 'Sahifa topilmadi',
          desc: "So'ralgan manzil topilmadi. URL noto'g'ri yozilgan bo'lishi mumkin yoki sahifa o'chirilgan.",
          button: 'Asosiy sahifaga qaytish'
        },
        ru: {
          pageTitle: '404 - Stranitsa ne naidena | KUKA HOME',
          title: 'Stranitsa ne naidena',
          desc: 'Zaproshennyi adres ne naiden. Vozmozhno, URL vveden neverno ili stranitsa udalena.',
          button: 'Vernutsya na glavnuyu'
        },
        en: {
          pageTitle: '404 - Page not found | KUKA HOME',
          title: 'Page not found',
          desc: 'The requested address was not found. The URL may be incorrect or the page has been removed.',
          button: 'Back to home page'
        },
        zh: {
          pageTitle: '404 - Page not found | KUKA HOME',
          title: 'Page not found',
          desc: 'The requested address was not found. The URL may be incorrect or the page has been removed.',
          button: 'Back to home page'
        },
        kz: {
          pageTitle: '404 - Bet tabylmady | KUKA HOME',
          title: 'Bet tabylmady',
          desc: 'Suralgan manzil tabylmady. URL durys emes engizilgen boluy mumkin nemese bet oshirilgen.',
          button: 'Basty betke qaytu'
        }
      };

      var lang = 'uz';
      try {
        lang = localStorage.getItem('kuka_lang') || 'uz';
      } catch (e) {}

      if (!I18N[lang]) lang = 'uz';
      var dict = I18N[lang];

      document.documentElement.setAttribute('lang', lang);
      document.title = dict.pageTitle;

      document.querySelectorAll('[data-i18n]').forEach(function (el) {
        var key = el.getAttribute('data-i18n');
        if (key && dict[key]) el.textContent = dict[key];
      });

      document.querySelectorAll('[data-i18n-aria-label]').forEach(function (el) {
        var key = el.getAttribute('data-i18n-aria-label');
        if (key && dict[key]) el.setAttribute('aria-label', dict[key]);
      });
    })();
  </script>
</body>
</html>
